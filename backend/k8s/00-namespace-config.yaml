apiVersion: v1
kind: Namespace
metadata:
  name: educore
  labels:
    name: educore
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: educore-config
  namespace: educore
data:
  NODE_ENV: production
  API_GATEWAY_PORT: "3000"
  AUTH_SERVICE_PORT: "4000"
  STUDENT_SERVICE_PORT: "4001"
  ACADEMIC_SERVICE_PORT: "4002"
  FINANCE_SERVICE_PORT: "4003"
  NOTIFICATION_SERVICE_PORT: "4004"
  TENANT_SERVICE_PORT: "4005"
  ANALYTICS_SERVICE_PORT: "4008"
  REPORT_SERVICE_PORT: "4009"
  AI_SERVICE_PORT: "4009"
  CHATBOT_SERVICE_PORT: "4010"
---
apiVersion: v1
kind: Secret
metadata:
  name: educore-secrets
  namespace: educore
type: Opaque
stringData:
  MONGODB_URI: mongodb://admin:password@mongodb:27017/educore?authSource=admin
  REDIS_URL: redis://redis:6379
  JWT_SECRET: educore-secret-key-production
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: educore-storage
provisioner: kubernetes.io/aws-ebs
parameters:
  type: gp2
  iops: "3000"
  volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
