---
# Analytics Service
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: educore
  labels:
    app: analytics-service
spec:
  selector:
    app: analytics-service
  ports:
    - name: http
      port: 4008
      targetPort: 4008
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: educore
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4008"
    spec:
      containers:
        - name: analytics-service
          image: educore/analytics-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4008
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: educore-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: educore-config
                  key: ANALYTICS_SERVICE_PORT
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: educore-secrets
                  key: MONGODB_URI
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: educore-secrets
                  key: REDIS_URL
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 800m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 4008
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4008
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: educore
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
