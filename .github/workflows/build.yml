name: Build & Push Docker Images

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      registry:
        description: 'Container registry (dockerhub, ghcr, ecr)'
        required: true
        default: 'ghcr'

jobs:
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      registry: ${{ steps.set-registry.outputs.registry }}
      version: ${{ steps.set-version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set build matrix
        id: set-matrix
        run: |
          MATRIX=$(cat <<'EOF'
          {
            "service": [
              "api-gateway",
              "auth-service",
              "student-service",
              "academic-service",
              "finance-service",
              "notification-service",
              "report-service",
              "analytics-service",
              "ai-service",
              "chatbot-service"
            ]
          }
          EOF
          )
          echo "matrix=$(echo $MATRIX | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Set registry
        id: set-registry
        run: |
          REGISTRY="${{ github.event.inputs.registry || 'ghcr' }}"
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT

      - name: Set version
        id: set-version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ github.ref_name }}-${{ github.sha }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && needs.setup.outputs.registry == 'dockerhub'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request' && needs.setup.outputs.registry == 'ecr'
        uses: aws-actions/amazon-ecr-login@v1
        env:
          AWS_REGION: us-east-1
        with:
          registry-type: public

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/educore-${{ matrix.service }}
            ${{ secrets.DOCKERHUB_USERNAME && format('{0}/educore-{1}', secrets.DOCKERHUB_USERNAME, matrix.service) || '' }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=${{ needs.setup.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend/services/${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.setup.outputs.version }}

      - name: Image digest
        run: echo "Digest: ${{ steps.docker_build.outputs.digest }}"

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        if: github.event_name != 'pull_request'
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk security scan
        uses: snyk/actions/docker@master
        if: false  # Enable when Snyk token is configured
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ github.repository_owner }}/educore-api-gateway:${{ github.sha }}
          args: --severity-threshold=high
        continue-on-error: true

      - name: Docker Scout analysis
        uses: docker/scout-action@v1
        if: github.event_name != 'pull_request'
        with:
          command: compare
          image: ghcr.io/${{ github.repository_owner }}/educore-api-gateway:${{ github.sha }}
          to-latest: true
          summary: true
        continue-on-error: true

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: always()
    
    steps:
      - name: Create build summary
        run: |
          echo "## Docker Build Summary 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Information:**" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: ${{ needs.setup.outputs.registry }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ needs.setup.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services Built:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ api-gateway" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ auth-service" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ student-service" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ academic-service" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ finance-service" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ notification-service" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ report-service" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ analytics-service" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ai-service" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ chatbot-service" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security Checks:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Trivy vulnerability scanning" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker Scout analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to: \`ghcr.io/${{ github.repository_owner }}\`" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    
    steps:
      - name: Notify build failure
        run: |
          echo "❌ Docker build pipeline failed"
          echo "Check the workflow logs for details"
