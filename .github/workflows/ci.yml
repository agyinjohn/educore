name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [api-gateway, auth-service]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: educore
          POSTGRES_PASSWORD: password
          POSTGRES_DB: educore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend/services/${{ matrix.service }}

      - name: Type check
        run: npx tsc --noEmit
        working-directory: backend/services/${{ matrix.service }}

      - name: Run tests
        run: npm test
        working-directory: backend/services/${{ matrix.service }}
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://educore:password@localhost:5432/educore_test
          JWT_ACCESS_SECRET: test_access_secret_that_is_long_enough_for_testing_purposes
          JWT_REFRESH_SECRET: test_refresh_secret_that_is_long_enough_for_testing_purposes

  lint-frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
